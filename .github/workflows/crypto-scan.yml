name: crypto-live-scan

# Runs the validated CryptoStrategy trigger scanner every 15 min in the cloud (no laptop needed).
# Any FIRED signal is appended to results/live_scan_log.csv and committed back to the repo, so
# the log persists and you can read it any time on github.com. Dedup state (live_scan_seen.json)
# is committed too, so the same hourly signal is never double-logged across runs.

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes (UTC). GitHub may delay under load.
  workflow_dispatch:          # lets you run it manually from the Actions tab

# Don't let two scheduled runs overlap (they'd race on the commit).
concurrency:
  group: crypto-scan
  cancel-in-progress: false

permissions:
  contents: write             # needed to commit the log back to the repo

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run scan
        env:
          # Binance is blocked (HTTP 451) from GitHub's US runners; use alts that serve all pairs.
          SCAN_EXCHANGES: "kucoin,mexc,bybit,okx"
        run: python live_scan.py

      - name: Commit log if changed
        run: |
          git config user.name "crypto-scan-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          if git diff --staged --quiet; then
            echo "no changes to commit"
          else
            git commit -m "scan $(date -u +'%Y-%m-%dT%H:%MZ')"
            git pull --rebase --autostash
            git push
          fi
